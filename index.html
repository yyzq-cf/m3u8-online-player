<body>
<header>
    <div class="header-container">

            <h1>m3u8 在线播放器</h1>
        </div>

</header>
<div class="container">
    <section class="input-section">
        <div class="input-container">
            <input type="text" id="url" placeholder="请输入 m3u8 视频链接地址" autocomplete="off">
            <div class="btn-group">
                <button id="doplayers"><i class="fas fa-play"></i> 播放</button>
                <button id="downloadBtn" title="下载视频"><i class="fas fa-download"></i> 下载</button>
            </div>

            <span style="color: #666; font-size: 1.3rem;">示例：</span>
            <a href="javascript:void(0)" class="example-link" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">测试视频</a>
            <a href="javascript:void(0)" class="example-link" data-url="https://cph-pub-ms.eku.ac.kr/onlinevod/cph.mp4.m3u8">测试视频2</a>
        </div>
    </section>

        <div id="ckplays"></div>

        <div class="history-header">
            <h3><i class="fas fa-history"></i> 播放历史</h3>
            <a href="javascript:void(0)" class="clear-history" id="clear-history">清空记录</a>
        </div>
        <div class="history-list" id="history-list"></div>
    </section>

<footer class="footer">

<script>
// 全局变量
var dp;
var hls;
var currentVideoUrl = '';
// 播放历史存储
var playHistory = JSON.parse(localStorage.getItem('m3u8PlayHistory') || '[]');
// 初始化
$(function() {
    initTheme();
    renderHistory();
    initEvents();
});
// 主题初始化
function initTheme() {
    var isDark = localStorage.getItem('theme') !== 'light';
    if (isDark) {
        $('body').removeClass('light-mode');
    } else {
        $('body').addClass('light-mode');
    }
}
// 初始化事件
function initEvents() {
    // 点击播放
    $('#doplayers').click(function() {
        var url = $.trim($('#url').val());
        if (!url) {
            alert('请输入m3u8链接');
            return;
        }
        playVideo(url);
    });
    // 示例链接点击
    $('.example-link').click(function() {
        var url = $(this).data('url');
        $('#url').val(url);
        playVideo(url);
    });
    // 回车播放
    $('#url').keypress(function(e) {
        if (e.which === 13) {
            $('#doplayers').click();
        }
    });
    // 清空历史
    $('#clear-history').click(function() {
        playHistory = [];
        localStorage.setItem('m3u8PlayHistory', JSON.stringify(playHistory));
        renderHistory();
    });
    // 下载按钮点击
    $('#downloadBtn').click(function() {
        if (currentVideoUrl) {
            downloadVideo(currentVideoUrl);
        }
    });
}
// 播放视频
function playVideo(url) {
    currentVideoUrl = url;
    $('#downloadBtn').show();
    // 添加到历史记录
    addToHistory(url);
    // 创建DPlayer
    if (dp) {
        dp.destroy();
    }
    if (hls) {
        hls.destroy();
    }
    
    // 根据URL判断使用HLS.js还是DPlayer
    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(document.getElementById('ckplays'));
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            document.getElementById('ckplays').play();
        });
        hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log('网络错误，尝试重新加载...');
                        hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log('媒体错误，尝试恢复...');
                        hls.recoverMediaError();
                        break;
                    default:
                        console.log('其他错误');
                        hls.destroy();
                        break;
                }
            }
        });
        
        dp = new DPlayer({
            container: document.getElementById('ckplays'),
            autoplay: true,
            theme: '#6a1b9a',
            video: {
                url: url,
                type: 'customHls',
                customType: {
                    customHls: function(video, player) {
                        video.src = url;
                    }
                }
            }
        });
    } else if (dp) {
        dp = new DPlayer({
            container: document.getElementById('ckplays'),
            autoplay: true,
            theme: '#6a1b9a',
            video: {
                url: url,
                type: 'hls'
            }
        });
    } else {
        // 移动端
        dp = new DPlayer({
            container: document.getElementById('ckplays'),
            autoplay: true,
            theme: '#6a1b9a',
            video: {
                url: url,
                type: 'hls'
            }
        });
    }
}
// 添加到历史记录
function addToHistory(url) {
    // 检查是否已存在
    var exists = playHistory.some(function(item) {
        return item.url === url;
    });
    if (!exists) {
        playHistory.unshift({
            url: url,
            time: new Date().toLocaleString()
        });
        // 最多保存10条
        if (playHistory.length > 10) {
            playHistory.pop();
        }
        localStorage.setItem('m3u8PlayHistory', JSON.stringify(playHistory));
        renderHistory();
    }
}
// 渲染历史记录
function renderHistory() {
    var $historyList = $('#history-list');
    if (playHistory.length === 0) {
        $historyList.html('<div class="no-history">暂无播放记录</div>');
        $('#history-section').removeClass('visible');
        return;
    }
    $('#history-section').addClass('visible');
    var html = '';
    playHistory.forEach(function(item) {
        var title = item.url.split('/').pop() || 'm3u8视频';
        html += '<a href="javascript:void(0)" class="history-item" data-url="' + item.url + '">';
        html += '<div class="history-item-title">' + title + '</div>';
        html += '<div class="history-item-time">' + item.time + '</div>';
        html += '</a>';
    });
    $historyList.html(html);
    // 历史记录点击
    $('.history-item').click(function() {
        var url = $(this).data('url');
        $('#url').val(url);
        playVideo(url);
    });
}
// 下载视频功能 - 直接打开在线下载页面
function downloadVideo(url) {
    // 使用 online-m3u8.com 服务直接下载
    var downloadUrl = 'https://www.online-m3u8.com/?url=' + encodeURIComponent(url);
    window.open(downloadUrl, '_blank');
}

// 复制到剪贴板
function copyToClipboard(text) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
            console.log('复制成功');
        }).catch(function(err) {
            console.error('复制失败:', err);
            // 备用方案
            fallbackCopy(text);
        });
    } else {
        fallbackCopy(text);
    }
}

// 备用复制方法
function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        console.log('备用复制成功');
    } catch (err) {
        console.error('备用复制失败:', err);
    }
    document.body.removeChild(textarea);
}
</script>
